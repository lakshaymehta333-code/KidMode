name: Apply Code Changes

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Patch source files via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            async function updateFile(path, b64) {
              const { data } = await github.rest.repos.getContent({ owner, repo, path });
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path,
                message: 'Update ' + path.split('/').pop(),
                content: b64,
                sha: data.sha,
              });
              console.log('Updated: ' + path);
            }

            await updateFile(
              'app/src/main/java/com/kidmode/BoringActivity.kt',
              ''
            );

            await updateFile(
              'app/src/main/java/com/kidmode/KidModeTileService.kt',
              ''
            );

            await updateFile(
              'app/src/main/java/com/kidmode/MainActivity.kt',
              ''
            );

            await updateFile(
              'app/src/main/res/values/colors.xml',
              ''
            );

            await updateFile(
              'app/src/main/res/values/themes.xml',
              ''
            );

            console.log('All 5 files updated!');
